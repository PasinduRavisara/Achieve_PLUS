<div class="auth-container">
  <div class="auth-card glass-panel">
    <div class="header">
      <h1 class="logo-text">Achieve<span class="plus">+</span></h1>
      <p class="subtitle">Welcome back! Please login to your account.</p>
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required class="glass-input">
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required class="glass-input">
      </div>

      <button type="submit" class="submit-btn">Login</button>
    </form>

    <!-- Demo buttons removed for production readiness -->

    
    <p class="footer-text">Don't have an account? <a routerLink="/signup">Sign up</a></p>
  </div>
</div>

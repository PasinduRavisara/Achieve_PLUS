<div class="signup-container">
  <div class="signup-content">
    <div class="brand-logo">Achieve+</div>
    <app-glass-card>
      <h2>Create Account</h2>
      <p class="subtitle">Join the team today</p>
      
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" class="glass-input" placeholder="John Doe">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" class="glass-input" placeholder="user@example.com">
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="glass-input" placeholder="••••••••">
      </div>

      <div class="actions">
        <button class="btn-primary w-100" (click)="signup()">Sign Up</button>
        <p class="login-link">Already have an account? <a href="/login" style="color: var(--color-accent);">Login</a></p>
      </div>
    </app-glass-card>
  </div>
</div>

<div class="login-container">
  <div class="glass-card login-card">
    <div class="header">
      <h1 class="logo-text">Achieve<span class="plus">+</span></h1>
      <p>Create your account</p>
    </div>

    <form (ngSubmit)="onSignup()">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrapper">
          <i class="bi bi-person"></i>
          <input type="text" placeholder="John Doe" [(ngModel)]="fullName" name="fullName">
        </div>
      </div>
      
      <div class="form-group">
        <div class="label-row flex-between" style="display: flex; justify-content: space-between;">
           <label>Email Address</label>
           <span *ngIf="emailExistsError" class="text-danger small" style="color: #ff4d4d; font-size: 0.8rem;">{{ emailExistsError }}</span>
        </div>
        <div class="input-wrapper">
          <i class="bi bi-envelope"></i>
          <input type="email" placeholder="name@company.com" [(ngModel)]="email" name="email" [class.is-invalid]="emailExistsError">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="bi bi-lock"></i>
          <input type="password" placeholder="••••••••" [(ngModel)]="password" name="password">
        </div>
      </div>

      <div class="form-group">
        <div class="label-row flex-between" style="display: flex; justify-content: space-between;">
           <label>Confirm Password</label>
           <span *ngIf="passwordMismatchError" class="text-danger small" style="color: #ff4d4d; font-size: 0.8rem;">{{ passwordMismatchError }}</span>
        </div>
        <div class="input-wrapper">
          <i class="bi bi-lock-fill"></i>
          <input type="password" placeholder="••••••••" [(ngModel)]="confirmPassword" name="confirmPassword" [class.is-invalid]="passwordMismatchError">
        </div>
      </div>

      <button class="btn-login glow-hover" type="submit">Sign Up</button>
      
      <div class="footer">
        <p>Already have an account? <a routerLink="/login">Login</a></p>
      </div>
    </form>
  </div>
</div>

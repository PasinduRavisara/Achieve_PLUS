<div class="streak-container">
  <div class="flame-icon" [class.active]="streakCount > 0">🔥</div>
  <div class="streak-info">
    <div class="count">{{ streakCount }} Days</div>
    <div class="label">Current Streak</div>
  </div>
  
  <div class="progress-ring">
      <!-- SVG Ring for effect -->
      <svg class="ring-svg" width="50" height="50" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" fill="none" class="ring-bg" stroke-width="8"></circle>
          <circle cx="50" cy="50" r="45" fill="none" class="ring-fill" stroke-width="8" stroke-dasharray="283" stroke-dashoffset="100"></circle>
      </svg>
  </div>
</div>

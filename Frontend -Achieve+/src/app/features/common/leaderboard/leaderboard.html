<div class="page-header">
  <h2>Leaderboard</h2>
  <p class="subtitle">Top performers this month.</p>
</div>

<div class="leaderboard-content">
  <!-- Top 3 Podium (Visual) -->
  <div class="podium">
    <div class="podium-place second">
      <div class="avatar-circle">M</div>
      <div class="rank-badge">2</div>
      <span class="name">Mike</span>
      <span class="points">3120</span>
    </div>
    <div class="podium-place first">
      <div class="crown">👑</div>
      <div class="avatar-circle big">S</div>
      <div class="rank-badge">1</div>
      <span class="name">Sarah</span>
      <span class="points">3450</span>
    </div>
    <div class="podium-place third">
      <div class="avatar-circle">A</div>
      <div class="rank-badge">3</div>
      <span class="name">Alex</span>
      <span class="points">2980</span>
    </div>
  </div>

  <!-- List for the rest -->
  <app-glass-card>
    <table class="glass-table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Employee</th>
          <th>Role</th>
          <th>Points</th>
          <th>Trend</th>
        </tr>
      </thead>
      <tbody>
        @for (user of leaders; track user.rank) {
          <tr [class.highlight]="user.rank <= 3">
            <td>#{{ user.rank }}</td>
            <td class="user-cell">
              <div class="avatar-sm">{{ user.name.charAt(0) }}</div>
              {{ user.name }}
            </td>
            <td>{{ user.role }}</td>
            <td class="points-cell">{{ user.points }}</td>
            <td>{{ user.trend }}</td>
          </tr>
        }
      </tbody>
    </table>
  </app-glass-card>
</div>

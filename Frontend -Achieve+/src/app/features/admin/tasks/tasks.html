<div class="page-header">
  <h2>Task Management</h2>
  <button class="btn-primary">+ Create Task</button>
</div>

<div class="admin-tasks-grid">
  <app-glass-card class="col-span-1" *ngFor="let task of tasks">
    <div class="task-card-header">
      <span class="priority-dot" [attr.data-priority]="task.priority"></span>
      <span class="task-id">#{{ task.id }}</span>
      <span class="status-badge" [attr.data-status]="task.status">{{ task.status }}</span>
    </div>
    
    <h3>{{ task.title }}</h3>
    
    <div class="task-assignee">
      <div class="avatar-xs">{{ task.assignee.charAt(0) }}</div>
      <span>{{ task.assignee }}</span>
    </div>

    <div class="task-actions">
        <button class="btn-glass btn-xs">Edit</button>
        <button class="btn-primary btn-xs" *ngIf="task.status === 'review'" (click)="approve(task.id)">Approve</button>
    </div>
  </app-glass-card>
</div>

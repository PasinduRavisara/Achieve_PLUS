<div class="store-container">
  <!-- Header -->
  <div class="header mb-4 flex-between">
    <div>
      <h1>Manage Rewards</h1>
      <!-- <p class="subtitle">Manage inventory and reward items</p> -->
    </div>
    <button class="btn-create"><i class="bi bi-plus-lg"></i> Add New Reward</button>
  </div>

  <!-- Rewards Table -->
  <div class="table-card glass-panel p-0 overflow-hidden">
    <table class="rewards-table">
      <thead>
        <tr>
          <th>NAME</th>
          <th>DESCRIPTION</th>
          <th>POINTS COST</th>
          <th>QUANTITY</th>
          <th>IMAGE URL</th>
          <th>ACTIONS</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of rewards">
          <td><span class="fw-bold">{{ item.name }}</span></td>
          <td class="text-muted">{{ item.description }}</td>
          <td><span class="cost-badge">{{ item.cost }} XP</span></td>
          <td>{{ item.quantity }}</td>
          <td class="text-muted text-sm truncate">{{ item.imageUrl }}</td>
          <td>
            <div class="actions">
              <button class="icon-btn edit"><i class="bi bi-pencil-square"></i></button>
              <button class="icon-btn delete" (click)="deleteReward(item.id)"><i class="bi bi-trash"></i></button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    
    <!-- Empty State -->
    <div class="empty-state" *ngIf="rewards.length === 0">
      <p>No rewards found.</p>
    </div>
  </div>
</div>

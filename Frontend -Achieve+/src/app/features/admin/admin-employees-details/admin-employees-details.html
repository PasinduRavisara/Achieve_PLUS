<div class="employees-container">
  <!-- Banner Header -->
  <div class="header-banner glass-panel mb-4">
    <div class="header-content">
      <h1>Employee Management</h1>
      <p class="subtitle">View team members</p>
    </div>
    <div class="header-illustration">
       <!-- Placeholder for illustration or decorative icon -->
       <i class="bi bi-people-fill illustration-icon"></i>
    </div>
  </div>

  <!-- Employee Table -->
  <div class="table-card glass-panel p-0 overflow-hidden">
    <div class="table-header p-3 flex-between">
      <div class="table-title">All Employees</div>
      <!-- Add Search/Filter if needed -->
    </div>
    <table class="employees-table">
      <thead>
        <tr>
          <th>NAME</th>
          <th>EMAIL</th>
          <th>ROLE</th>
          <th>JOIN DATE</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let emp of employees">
          <td>
            <div class="employee-cell">
              <!-- <img [src]="emp.avatar" class="avatar"> --><!-- Screenshot didn't clearly show avatar in table, but it's good UX. Screenshot showed just text 'Ravisara' in first col. I will keep avatar for better aesthetic. -->
              <span class="name">{{ emp.name }}</span>
            </div>
          </td>
          <td class="text-muted">{{ emp.email }}</td>
          <td>
            <span class="role-badge">{{ emp.role }}</span>
          </td>
          <td class="text-muted">{{ emp.joinDate }}</td>
          <td>
            <span class="status-badge" [ngClass]="getStatusClass(emp.status)">
              {{ emp.status }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

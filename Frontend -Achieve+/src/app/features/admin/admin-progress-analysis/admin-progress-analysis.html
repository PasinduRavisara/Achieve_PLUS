<div class="analysis-container">
  <div class="header mb-4">
    <h1>Progress Analysis</h1>
    <p class="subtitle">Company-wide performance metrics</p>
  </div>

  <div class="grid-container">
    <!-- Main Productivity Chart -->
    <div class="glass-card full-width">
      <h3><i class="bi bi-graph-up text-primary"></i> Overall Productivity</h3>
      <div class="chart-container">
        <div class="css-chart">
           <div class="data-point" style="height: 40%"><span>Mon</span></div>
           <div class="data-point" style="height: 65%"><span>Tue</span></div>
           <div class="data-point" style="height: 50%"><span>Wed</span></div>
           <div class="data-point" style="height: 85%"><span>Thu</span></div>
           <div class="data-point" style="height: 70%"><span>Fri</span></div>
           <div class="data-point" style="height: 90%"><span>Sat</span></div>
           <div class="data-point" style="height: 60%"><span>Sun</span></div>
        </div>
      </div>
    </div>

    <!-- Department Performance -->
    <div class="glass-card">
      <h3><i class="bi bi-pie-chart-fill text-secondary"></i> Department Breakdown</h3>
      <div class="skills-container">
        <div class="skill-bar">
          <div class="skill-info">
            <span>Engineering</span>
            <span>92%</span>
          </div>
          <div class="progress-bar"><div class="fill" style="width: 92%"></div></div>
        </div>
        <div class="skill-bar">
          <div class="skill-info">
            <span>Marketing</span>
            <span>85%</span>
          </div>
          <div class="progress-bar"><div class="fill" style="width: 85%; background: var(--secondary)"></div></div>
        </div>
        <div class="skill-bar">
          <div class="skill-info">
            <span>Sales</span>
            <span>78%</span>
          </div>
          <div class="progress-bar"><div class="fill" style="width: 78%; background: var(--accent)"></div></div>
        </div>
      </div>
    </div>

    <!-- Engagement Stats -->
    <div class="glass-card">
      <h3><i class="bi bi-people-fill text-accent"></i> Employee Engagement</h3>
      <div class="stats-row">
        <div class="stat-circle">
          <span class="value">95%</span>
          <span class="label">Login Rate</span>
        </div>
        <div class="stat-circle">
          <span class="value">88%</span>
          <span class="label">Task Comp.</span>
        </div>
      </div>
    </div>
  </div>
</div>

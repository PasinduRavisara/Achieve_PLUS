<div class="dashboard-header">
  <div>
    <h2>Admin Dashboard</h2>
    <p class="subtitle">Overview of system performance</p>
  </div>
  <p class="date">{{ today | date:'mediumDate' }}</p>
</div>

<div class="stats-grid">
  <div class="glass-card stat-card">
    <div class="stat-icon primary"><i class="bi bi-people-fill"></i></div>
    <div class="stat-info">
      <h3>124</h3>
      <p>Total Employees</p>
    </div>
  </div>
  <div class="glass-card stat-card">
    <div class="stat-icon secondary"><i class="bi bi-check-circle-fill"></i></div>
    <div class="stat-info">
      <h3>1,402</h3>
      <p>Tasks Completed</p>
    </div>
  </div>
   <div class="glass-card stat-card">
    <div class="stat-icon accent"><i class="bi bi-gift-fill"></i></div>
    <div class="stat-info">
      <h3>45</h3>
      <p>Rewards Claimed</p>
    </div>
  </div>
</div>

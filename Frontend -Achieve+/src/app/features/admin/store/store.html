<div class="page-header">
  <h2>Store Management</h2>
  <button class="btn-primary">+ Add Item</button>
</div>

<div class="store-grid">
  <!-- Inventory List -->
  <app-glass-card class="col-span-full">
    <table class="glass-table">
      <thead>
        <tr>
          <th>Item Name</th>
          <th>Stock Level</th>
          <th>Point Cost</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (item of inventory; track item.id) {
          <tr>
            <td>{{ item.title }}</td>
            <td>
              <span [class.text-danger]="item.stock < 20">{{ item.stock }}</span>
            </td>
            <td>{{ item.cost }} pts</td>
            <td>
              <span class="status-badge" [class.active]="item.active">{{ item.active ? 'Active' : 'Inactive' }}</span>
            </td>
            <td>
              <button class="btn-glass btn-xs">Edit</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </app-glass-card>
</div>

<div class="page-header">
  <h2>Wellness Check-in</h2>
  <p class="subtitle">How are you feeling today?</p>
</div>

<app-glass-card class="mood-tracker">
  <h3>Daily Mood</h3>
  <div class="mood-selector">
    @for (mood of moods; track mood) {
      <button class="mood-btn" 
              [class.selected]="selectedMood === mood"
              (click)="selectMood(mood)">
        {{ mood }}
      </button>
    }
  </div>
  @if (selectedMood) {
    <p class="mood-response">Thanks for sharing! Taking care of yourself is important.</p>
  }
</app-glass-card>

<h3 class="mt-4">Wellness Tips</h3>
<div class="bento-grid tips-grid">
  @for (tip of tips; track tip.title) {
    <app-glass-card class="tip-card col-span-1">
      <h4>{{ tip.title }}</h4>
      <p>{{ tip.text }}</p>
    </app-glass-card>
  }
</div>

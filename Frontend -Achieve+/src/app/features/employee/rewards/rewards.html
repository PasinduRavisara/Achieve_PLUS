<div class="page-header">
  <h2>Achievements</h2>
  <p class="subtitle">Badges earned through your hard work.</p>
</div>

<div class="achievements-grid">
  @for (badge of achievements; track badge.id) {
    <app-glass-card class="badge-card" [attr.data-rarity]="badge.rarity">
      <div class="glow"></div>
      <div class="badge-icon">{{ badge.icon }}</div>
      <h3>{{ badge.title }}</h3>
      <p class="badge-desc">{{ badge.description }}</p>
      <span class="badge-date">Earned {{ badge.date }}</span>
    </app-glass-card>
  }
</div>

<div class="page-header">
  <h2>Analytical Insights</h2>
  <p class="subtitle">Deep dive into your productivity metrics.</p>
</div>

<div class="bento-grid">
  <!-- Weekly Trend -->
  <app-glass-card class="col-span-2 row-span-2">
    <h3>Weekly Task Velocity</h3>
    <div class="chart-container">
      <ngx-charts-bar-vertical
        [view]="[500, 300]"
        [scheme]="colorScheme"
        [results]="single"
        [gradient]="gradient"
        [xAxis]="showXAxis"
        [yAxis]="showYAxis"
        [showXAxisLabel]="showXAxisLabel"
        [showYAxisLabel]="showYAxisLabel"
        [xAxisLabel]="xAxisLabel"
        [yAxisLabel]="yAxisLabel">
      </ngx-charts-bar-vertical>
    </div>
  </app-glass-card>

  <!-- Distribution -->
  <app-glass-card class="col-span-1 row-span-2">
    <h3>Work Distribution</h3>
    <div class="chart-container-pie">
      <ngx-charts-pie-chart
        [view]="[250, 250]"
        [scheme]="colorScheme"
        [results]="pieData"
        [gradient]="gradient"
        [doughnut]="true">
      </ngx-charts-pie-chart>
    </div>
  </app-glass-card>

  <!-- Summary Cards -->
  <app-glass-card class="col-span-1 row-span-1">
    <h3>Focus Score</h3>
    <div class="big-metric">8.5<span class="small">/10</span></div>
  </app-glass-card>

  <app-glass-card class="col-span-1 row-span-1">
    <h3>Streak</h3>
    <div class="big-metric">🔥 5 Days</div>
  </app-glass-card>
</div>

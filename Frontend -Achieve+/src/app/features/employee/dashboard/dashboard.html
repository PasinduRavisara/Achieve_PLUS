<div class="dashboard-header">
  <h1>Welcome back, <span class="text-gradient">Alex</span></h1>
  <p class="subtitle">Here's your daily overview.</p>
</div>

<div class="bento-grid">
  <!-- Stats Card -->
  <app-glass-card class="col-span-2 row-span-1">
    <h3>Weekly Progress</h3>
    <div class="stat-big">85%</div>
    <p class="text-muted">Tasks completed on time</p>
  </app-glass-card>

  <!-- Quick Action -->
  <app-glass-card class="col-span-1 row-span-1">
    <h3>Tasks</h3>
    <div class="stat-number">12</div>
    <p class="text-muted">Pending</p>
  </app-glass-card>

  <!-- Rewards -->
  <app-glass-card class="col-span-1 row-span-2">
    <h3>Rewards</h3>
    <div class="reward-circle">
      <span>2,400</span>
      <small>Points</small>
    </div>
    <button class="btn-glass mt-4">Redeem</button>
  </app-glass-card>

  <!-- Recent Activity -->
  <app-glass-card class="col-span-2 row-span-1">
    <h3>Recent Activity</h3>
    <ul class="activity-list">
      <li>Completed "Design Review" <span class="time">2h ago</span></li>
      <li>Earned "Early Bird" badge <span class="time">5h ago</span></li>
    </ul>
  </app-glass-card>

  <!-- Wellness -->
  <app-glass-card class="col-span-1 row-span-1">
    <h3>Wellness</h3>
    <p>Mood: 😌 Calm</p>
  </app-glass-card>
</div>

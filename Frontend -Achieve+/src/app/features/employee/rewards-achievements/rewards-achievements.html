<div class="rewards-container">
  <!-- Header -->
  <div class="header mb-4">
    <h1>Rewards & Achievements</h1>
    <p class="subtitle">Track your earned badges and accomplishments</p>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid mb-4">
    <!-- Total Badges -->
    <div class="stat-card glass-panel">
      <div class="stat-icon bg-yellow-light"><i class="bi bi-trophy-fill text-yellow"></i></div>
      <div class="stat-info">
        <h3>Total Badges</h3>
        <p class="stat-value">{{ stats.badges }}</p>
      </div>
    </div>

    <!-- Points Earned -->
    <div class="stat-card glass-panel">
      <div class="stat-icon bg-orange-light"><i class="bi bi-star-fill text-orange"></i></div>
      <div class="stat-info">
        <h3>Points Earned</h3>
        <p class="stat-value">{{ stats.points }}</p>
      </div>
    </div>

    <!-- Current Streak -->
    <div class="stat-card glass-panel">
      <div class="stat-icon bg-blue-light"><i class="bi bi-award-fill text-blue"></i></div>
      <div class="stat-info">
        <h3>Current Streak</h3>
        <p class="stat-value">{{ stats.streak }} days</p>
      </div>
    </div>
  </div>

  <!-- Achievements List -->
  <div class="achievements-section glass-panel">
    <h2 class="section-title">Your Achievements</h2>
    
    <div class="empty-state" *ngIf="achievements.length === 0">
      <div class="empty-icon">
        <i class="bi bi-trophy"></i>
      </div>
      <h3>No Achievements Yet</h3>
      <p>Complete tasks before their due date to earn badges!</p>
    </div>

    <div class="achievements-grid" *ngIf="achievements.length > 0">
      <!-- List Items would go here -->
    </div>
  </div>
</div>

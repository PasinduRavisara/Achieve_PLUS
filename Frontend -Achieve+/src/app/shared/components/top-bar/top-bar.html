<div class="top-bar">
  <div class="top-bar-bg"></div>
  
  <div class="content-wrapper">
    <div class="left-section">
    <h2 class="page-title">{{ currentRouteName }}</h2>
  </div>

  <div class="center-section">
    <div class="search-bar" *ngIf="showSearch">
      <i class="bi bi-search search-icon"></i>
      <input type="text" placeholder="Search anything..." class="search-input">
    </div>
  </div>

  <div class="right-section">
    <!-- Notifications Bell -->
    <div class="notification-wrapper" (click)="toggleNotifications(); $event.stopPropagation()">
      <div class="bell-btn" [class.active]="showNotifications">
         <i class="bi bi-bell-fill"></i>
         <span class="badge-dot" *ngIf="unreadCount > 0"></span>
      </div>
    </div>

    <!-- Notification Modal Overlay -->
    <div class="modal-backdrop" *ngIf="showNotifications" (click)="toggleNotifications()">
      <div class="notification-modal glass-card" (click)="$event.stopPropagation()">
         <div class="modal-header">
            <div class="header-left">
              <h3>Notifications</h3>
              <span class="badge-count" *ngIf="unreadCount > 0">{{ unreadCount }} new</span>
            </div>
            <button class="close-btn" (click)="toggleNotifications()"><i class="bi bi-x"></i></button>
         </div>
         
         <div class="modal-body">
            <div class="notif-item" *ngFor="let n of notifications" [class.unread]="!n.read">
              <div class="notif-icon"><i class="bi bi-info-circle"></i></div>
              <div class="notif-content">
                <p>{{ n.message }}</p>
                <span class="time">Just now</span>
              </div>
              <div class="dot" *ngIf="!n.read"></div>
            </div>
            
            <div class="empty-notif" *ngIf="notifications.length === 0">
              <i class="bi bi-bell-slash text-muted fs-2 mb-2"></i>
              <p>You're all caught up!</p>
            </div>
         </div>
         
         <div class="modal-footer">
            <button class="text-btn" (click)="markAllRead()">Mark all as read</button>
            <button class="btn-primary-sm" (click)="toggleNotifications()">Done</button>
         </div>
      </div>
    </div>

    <!-- User Profile (New) -->
    <div class="user-profile" (click)="toggleProfileMenu()">
      <img [src]="userAvatar" class="nav-avatar">
      <div class="user-info">
        <span class="user-name">{{ user?.fullName || 'User' }}</span>
        <span class="user-role">{{ user?.role | titlecase }}</span>
      </div>
      <i class="bi bi-caret-down-fill dropdown-arrow"></i>

      <!-- Profile Dropdown -->
      <div class="profile-dropdown glass-card" *ngIf="showProfileMenu">
        <a [routerLink]="user?.role === 'admin' ? '/admin/profile' : '/dashboard/profile'" class="menu-item">
          <i class="bi bi-person-circle"></i> View Profile
        </a>
        
        <a [routerLink]="user?.role === 'admin' ? '/admin/help' : '/dashboard/help'" class="menu-item">
          <i class="bi bi-question-circle"></i> Help & Support
        </a>
        <a [routerLink]="user?.role === 'admin' ? '/admin/settings' : '/dashboard/settings'" class="menu-item">
          <i class="bi bi-gear-wide-connected"></i> Settings
        </a>
        <div class="menu-divider"></div>
        <button (click)="logout()" class="menu-item logout">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>
  </div>
  </div>
</div>

<aside class="sidebar glass-panel">
  <div class="sidebar-header">
    <div class="logo">
      <span class="logo-text">Achieve<span class="plus">+</span></span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ul>
      <li *ngFor="let item of menuItems">
        <a [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{exact: item.route === '/dashboard' || item.route === '/admin/dashboard'}">
          <i [class]="'bi ' + item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <div class="footer-row">
      <a [routerLink]="role === 'admin' ? '/admin/profile' : '/dashboard/profile'" routerLinkActive="active" class="nav-item profile-btn flex-grow" title="Profile">
        <img [src]="userAvatar" class="mini-avatar">
        <span>Profile</span>
      </a>
      <a [routerLink]="role === 'admin' ? '/admin/settings' : '/dashboard/settings'" routerLinkActive="active" class="nav-item settings-btn icon-only" title="Settings">
        <i class="bi bi-gear-fill"></i>
      </a>
    </div>
  </div>
</aside>

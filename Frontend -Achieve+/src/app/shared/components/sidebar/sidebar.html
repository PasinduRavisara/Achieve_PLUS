<aside class="sidebar glass-panel">
  <div class="sidebar-header">
    <div class="logo">
      <span class="logo-text">Achieve<span class="plus">+</span></span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ul>
      <li *ngFor="let item of menuItems">
        <a [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{exact: item.route === '/dashboard' || item.route === '/admin/dashboard'}">
          <i [class]="'bi ' + item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <div class="footer-row">
      <!-- Profile & Logout Container -->
      <div class="profile-capsule flex-grow">
        <a [routerLink]="role === 'admin' ? '/admin/profile' : '/dashboard/profile'" class="profile-link">
          <img [src]="userAvatar" class="mini-avatar">
          <span class="profile-text">Profile</span>
        </a>
        <button (click)="logout()" class="mini-logout-btn" title="Logout">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>

      <!-- Settings Button -->
      <a [routerLink]="role === 'admin' ? '/admin/settings' : '/dashboard/settings'" routerLinkActive="active" class="settings-box">
        <i class="bi bi-gear-fill"></i>
      </a>
    </div>
  </div>
</aside>

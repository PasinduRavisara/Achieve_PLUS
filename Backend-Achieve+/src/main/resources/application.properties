spring.application.name=AchievePlus-BE

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:AchievePlusSecretKeyForDevEnvironmentOnly1234567890}
app.jwt.expiration=86400000
app.jwt.header=Authorization
app.jwt.prefix=Bearer

# CORS Configuration
app.cors.allowed-origins=${FRONTEND_URL}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.achieveplus=DEBUG
logging.level.org.springframework.jdbc.datasource.init=DEBUG



# File Upload Limits
server.tomcat.max-http-post-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Increase Tomcat max header size to prevent header overflow
server.tomcat.max-http-header-size=20000


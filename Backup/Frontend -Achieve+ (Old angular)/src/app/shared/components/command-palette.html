<div class="palette-overlay glass-panel" *ngIf="isOpen()">
  <div class="palette-container">
    <div class="palette-header">
      <span class="search-icon">🔎</span>
      <input 
        #searchInput 
        type="text" 
        placeholder="Type a command or search..." 
        class="palette-input"
        (keydown.escape)="close()"
        autofocus
      />
      <span class="esc-hint">esc</span>
    </div>
    
    <div class="palette-results">
        <div class="result-group">
            <div class="group-title">Navigation</div>
            <div class="result-item active">
                <span class="item-icon">🏠</span>
                <span class="item-text">Go to Dashboard</span>
            </div>
            <div class="result-item">
                <span class="item-icon">✅</span>
                <span class="item-text">My Tasks</span>
            </div>
             <div class="result-item">
                <span class="item-icon">⚙️</span>
                <span class="item-text">Settings</span>
            </div>
        </div>
        
        <div class="result-group">
            <div class="group-title">Actions</div>
             <div class="result-item">
                <span class="item-icon">➕</span>
                <span class="item-text">Create New Task</span>
            </div>
        </div>
    </div>
    
    <div class="palette-footer">
        <span><kbd>↑</kbd> <kbd>↓</kbd> to navigate</span>
        <span><kbd>↵</kbd> to select</span>
    </div>
  </div>
</div>

<div class="page-header">
  <h2>Organization Analytics</h2>
  <div class="date-range">
    <button class="btn-glass">Last 30 Days</button>
  </div>
</div>

<div class="bento-grid">
  <!-- Team Velocity Line Chart -->
  <app-glass-card class="col-span-2 row-span-2">
    <h3>Team Velocity Trend</h3>
    <div class="chart-container">
      <ngx-charts-area-chart
        [view]="[500, 300]"
        [scheme]="colorScheme"
        [results]="teamVelocity"
        [gradient]="true"
        [xAxis]="true"
        [yAxis]="true"
        [showXAxisLabel]="true"
        [showYAxisLabel]="true"
        xAxisLabel="Timeline"
        yAxisLabel="Tasks Completed">
      </ngx-charts-area-chart>
    </div>
  </app-glass-card>

  <!-- Department Performance Bar Chart -->
  <app-glass-card class="col-span-2 row-span-2">
    <h3>Department Performance (Avg Score)</h3>
    <div class="chart-container">
      <ngx-charts-bar-vertical
        [view]="[500, 300]"
        [scheme]="colorScheme"
        [results]="deptPerformance"
        [gradient]="true"
        [xAxis]="true"
        [yAxis]="true"
        [showXAxisLabel]="true"
        [showYAxisLabel]="true"
        xAxisLabel="Department"
        yAxisLabel="Score">
      </ngx-charts-bar-vertical>
    </div>
  </app-glass-card>

  <!-- Key Metrics -->
  <app-glass-card class="col-span-1">
    <h3>Avg Task Time</h3>
    <div class="big-metric">4.2h <span class="trend positive">↓ 0.5h</span></div>
  </app-glass-card>

  <app-glass-card class="col-span-1">
    <h3>Active Users</h3>
    <div class="big-metric">98% <span class="trend">➖</span></div>
  </app-glass-card>
</div>
